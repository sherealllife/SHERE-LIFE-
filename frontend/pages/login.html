<!DOCTYPE html>
<html lang="rw">
<head>

    <title>Injira - SHERE LIFE</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar"><div class="container"><h1 class="logo">SHERE LIFE</h1></div></nav>
    <div class="auth-form">
        <h2>Injira muri konti yawe</h2>
        <form id="loginForm">
            <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
            <div class="form-group"><label>Ijambo ry'ibanga</label><input type="password" id="password" required></div>
            <button type="submit" class="btn btn-primary">Injira</button>
        </form>
        <p class="auth-link">Ntufite konti? <a href="register.html">Iyandikishe</a></p>
        <div id="message" style="margin-top:20px;text-align:center;color:red;"></div>
    </div>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
