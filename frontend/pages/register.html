<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iyandikishe - SHERE LIFE</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">SHERE LIFE</h1>
            <ul class="nav-links">
                <li><a href="../index.html">Ahabanza</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-form">
        <h2>Fungura konti yawe</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>Izina</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Ijambo ry'ibanga</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary">Iyandikishe</button>
        </form>
        <p class="auth-link">Ufite konti? <a href="login.html">Injira</a></p>
        <div id="message" style="margin-top:20px;text-align:center;color:red;"></div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
